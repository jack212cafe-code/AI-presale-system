<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Presale Assistant</title>
  <style>
    /* === DESIGN TOKENS (verbatim from intake/index.html) === */
    :root {
      color-scheme: light;
      --bg: #f6f2ea;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: #fffdf9;
      --ink: #171717;
      --muted: #6b7280;
      --line: rgba(23, 23, 23, 0.1);
      --accent: #111111;
      --accent-soft: rgba(17, 17, 17, 0.06);
      --success-bg: #eef6f1;
      --success-ink: #21593e;
      --error-bg: #fbefef;
      --error-ink: #8b2d38;
      --shadow: 0 24px 70px rgba(23, 23, 23, 0.08);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    /* === SIDEBAR === */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      height: 100vh;
      overflow-y: auto;
      background: var(--bg);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-header .primary {
      width: 100%;
    }

    .project-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .project-item {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      margin-bottom: 4px;
    }

    .project-item:hover {
      background: var(--accent-soft);
    }

    .project-item.active {
      background: var(--accent-soft);
    }

    .project-item-name {
      font-size: 16px;
      font-weight: 400;
      line-height: 1.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-item-date {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* === MAIN AREA === */
    .main {
      flex: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    /* === EMPTY STATE === */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--muted);
    }

    .empty-state h2 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--ink);
    }

    .empty-state p {
      margin: 0;
      font-size: 16px;
      max-width: 400px;
      line-height: 1.7;
    }

    /* === MESSAGES === */
    .message {
      margin-bottom: 16px;
    }

    .message-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 400;
      line-height: 1.5;
    }

    .bubble {
      padding: 16px 18px;
      border-radius: 24px;
      max-width: 720px;
      line-height: 1.7;
      font-size: 16px;
    }

    .bubble.user {
      background: var(--accent);
      color: #f7f4ef;
      margin-left: auto;
      border-bottom-right-radius: 6px;
    }

    .bubble.assistant {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      border-bottom-left-radius: 6px;
    }

    /* Markdown inside assistant bubbles */
    .bubble.assistant h2 {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      margin: 0 0 8px;
    }

    .bubble.assistant h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 8px 0 4px;
    }

    .bubble.assistant p {
      margin: 0 0 8px;
    }

    .bubble.assistant p:last-child {
      margin-bottom: 0;
    }

    .bubble.assistant table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 14px;
    }

    .bubble.assistant th,
    .bubble.assistant td {
      padding: 8px 12px;
      border: 1px solid var(--line);
      text-align: left;
    }

    .bubble.assistant th {
      background: var(--accent-soft);
      font-weight: 600;
    }

    .bubble.assistant ol,
    .bubble.assistant ul {
      margin: 4px 0;
      padding-left: 20px;
    }

    .bubble.assistant code {
      background: var(--accent-soft);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 14px;
    }

    /* === SOLUTION CARDS === */
    .solution-cards {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .solution-card {
      flex: 1;
      min-width: 140px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      text-align: center;
    }

    .solution-card-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .solution-card button {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #f7f4ef;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      min-height: 44px;
    }

    .solution-card button:hover {
      opacity: 0.9;
    }

    .solution-card button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* === DOWNLOAD BUTTON === */
    .download-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 20px;
      background: var(--accent);
      color: #f7f4ef;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      min-height: 44px;
      line-height: 1.5;
    }

    .download-btn:hover {
      opacity: 0.9;
    }

    /* === TYPING / LOADING === */
    .typing {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .stage-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    /* === COMPOSER === */
    .composer {
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 16px 20px;
      background: var(--surface);
    }

    .prompt-box {
      width: 100%;
      min-height: 72px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-strong);
      font-size: 16px;
      font-family: inherit;
      color: var(--ink);
      resize: vertical;
      line-height: 1.7;
    }

    .prompt-box:focus {
      outline: none;
      border-color: rgba(17,17,17,0.26);
      box-shadow: 0 0 0 4px rgba(17,17,17,0.06);
    }

    .prompt-box:disabled {
      opacity: 0.64;
    }

    .composer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .primary {
      padding: 13px 20px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #f7f4ef;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      min-height: 44px;
    }

    .primary:hover { opacity: 0.9; }
    .primary:disabled { opacity: 0.5; cursor: wait; }

    /* === ERROR BANNER === */
    .error-banner {
      display: none;
      padding: 12px 16px;
      background: var(--error-bg);
      color: var(--error-ink);
      border-radius: var(--radius-md);
      font-size: 14px;
      margin: 8px 20px;
    }

    .error-banner.visible { display: block; }


    /* === ERROR BUBBLE === */
    .error-bubble {
      background: #fef2f2 !important;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }
    .error-text { display: block; margin-bottom: 8px; }
    .retry-btn {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .retry-btn:hover { background: #b91c1c; }

    /* === UTILITY === */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="primary" id="new-chat-btn">+ New Chat</button>
    </div>
    <div class="project-list" id="project-list"></div>
  </div>

  <div class="main">
    <div class="thread" id="thread">
      <div class="empty-state" id="empty-state">
        <h2>เริ่มต้นการสนทนา</h2>
        <p>พิมพ์รายละเอียดโปรเจกต์ของคุณ เช่น ขนาดองค์กร ระบบที่ต้องการ หรือปัญหาที่พบ</p>
      </div>
    </div>
    <div id="error-banner" class="error-banner"></div>
    <div class="composer">
      <textarea class="prompt-box" id="prompt-box" placeholder="พิมพ์ข้อความ..." rows="3"></textarea>
      <div class="composer-row">
        <span class="hint">Enter เพื่อขึ้นบรรทัดใหม่ — กด ส่ง เพื่อส่งข้อความ</span>
        <button class="primary" id="send-btn">ส่ง</button>
      </div>
    </div>
  </div>

  <!-- CDN: marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@17.0.5/lib/marked.umd.js"
          crossorigin="anonymous"></script>
  <!-- CDN: DOMPurify for XSS sanitization -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js"
          crossorigin="anonymous"></script>
  <!-- Chat logic -->
  <script src="/chat/chat.js"></script>
</body>
</html>
