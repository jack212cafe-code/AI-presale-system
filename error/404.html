<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Franky-Presale</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#F9F7F4; --ink:#1C1410; --ink-dim:#6B5E52; --accent:#C96442; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { height:100vh; display:flex; align-items:center; justify-content:center; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); }
    .card { text-align:center; max-width:420px; padding:48px 32px; }
    .code { font-size:72px; font-weight:600; color:var(--accent); line-height:1; }
    h1 { font-size:20px; font-weight:500; margin:16px 0 8px; }
    p { color:var(--ink-dim); font-size:15px; line-height:1.5; margin-bottom:24px; }
    a { display:inline-block; padding:10px 24px; background:var(--accent); color:#fff; text-decoration:none; border-radius:8px; font-weight:500; font-size:14px; }
    a:hover { opacity:0.9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>ไม่พบหน้าที่ต้องการ</h1>
    <p>หน้าที่คุณกำลังมองหาอาจถูกย้าย ลบออก หรือไม่เคยมีอยู่</p>
    <a href="/chat">กลับหน้าแชท</a>
  </div>
</body>
</html>
