<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนใช้งาน AI Presale System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">สร้างบัญชีผู้ใช้</h1>
            <p class="text-slate-500">กรอกข้อมูลบริษัทของคุณเพื่อเริ่มต้นใช้งานระบบ</p>
        </div>

        <form id="signup-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อบริษัท</label>
                <input type="text" name="company" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="เช่น บริษัท เอบีซี จำกัด">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้ (Username)</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="ระบุชื่อผู้ใช้">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="อย่างน้อย 6 ตัวอักษร">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors shadow-md">
                ลงทะเบียนและเข้าสู่ระบบ
            </button>
        </form>

        <div id="message" class="mt-6 hidden p-3 rounded-lg text-sm text-center"></div>

        <div class="mt-8 text-center">
            <a href="/login" class="text-sm text-blue-600 hover:underline">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signup-form');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submit-btn');

        form.onsubmit = async (e) => {
            e.preventDefault();

            message.className = 'mt-6 p-3 rounded-lg text-sm text-center bg-slate-100 text-slate-600';
            message.textContent = 'กำลังประมวลผล...';
            message.classList.remove('hidden');
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (res.ok) {
                    message.className = 'mt-6 p-3 rounded-lg text-sm text-center bg-green-100 text-green-700';
                    message.textContent = 'ลงทะเบียนสำเร็จ! กำลังพาท่านไปยังหน้าหลัก...';
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    message.className = 'mt-6 p-3 rounded-lg text-sm text-center bg-red-100 text-red-700';
                    message.textContent = data.error || 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
                }
            } catch (err) {
                message.className = 'mt-6 p-3 rounded-lg text-sm text-center bg-red-100 text-red-700';
                message.textContent = 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้';
            } finally {
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
