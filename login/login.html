<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Franky-Presale — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F9F7F4;
      --surface: #FFFFFF;
      --surface-2: #F5F2EE;
      --border: rgba(60,40,20,0.1);
      --border-strong: rgba(60,40,20,0.16);
      --ink: #1C1410;
      --ink-dim: #6B5E52;
      --ink-faint: #A8998C;
      --accent: #C96442;
      --accent-light: #E0734F;
      --red: #C0392B;
      --red-dim: rgba(192,57,43,0.08);
      --radius: 14px;
      --radius-sm: 9px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: "DM Sans", "Segoe UI", system-ui, sans-serif;
      color: var(--ink);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 388px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px;
      box-shadow: 0 4px 24px rgba(60,40,20,0.08), 0 1px 3px rgba(60,40,20,0.06);
      animation: mountIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes mountIn {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 18px; height: 18px; fill: #fff; }
    .logo-text {
      font-family: "Lora", Georgia, serif;
      font-size: 18px; font-weight: 600; color: var(--ink);
    }
    .logo-sub { font-size: 11.5px; font-weight: 500; color: var(--ink-faint); margin-top: 2px; }

    h1 {
      font-family: "Lora", Georgia, serif;
      font-size: 25px; font-weight: 600; color: var(--ink);
      letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 6px;
    }
    .subtitle { font-size: 14.5px; color: var(--ink-dim); margin-bottom: 30px; line-height: 1.6; }

    label {
      display: block;
      font-size: 12px; font-weight: 600; color: var(--ink-dim);
      letter-spacing: 0.04em; margin-bottom: 7px;
    }
    input {
      width: 100%;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--ink);
      font-family: "DM Sans", sans-serif;
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--ink-faint); }
    .field { margin-bottom: 18px; }

    .error-msg {
      display: none;
      background: var(--red-dim);
      border: 1px solid rgba(192,57,43,0.2);
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13.5px;
      margin-bottom: 18px;
      animation: shake 0.28s ease;
    }
    .error-msg.visible { display: block; }
    @keyframes shake {
      0%,100%{transform:translateX(0);}
      25%{transform:translateX(-4px);}
      75%{transform:translateX(4px);}
    }

    button[type="submit"] {
      width: 100%; margin-top: 4px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: "DM Sans", sans-serif;
      font-size: 15px; font-weight: 600;
      padding: 13px; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button[type="submit"]:hover { background: var(--accent-light); transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: wait; transform: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20"><path d="M10 1.5L2.5 6v8l7.5 4.5L17.5 14V6L10 1.5zm0 2.18L15.5 7v6l-5.5 3.3L4.5 13V7L10 3.68z"/></svg>
      </div>
      <div>
        <div class="logo-text">Franky-Presale</div>
        <div class="logo-sub">Intelligence Platform</div>
      </div>
    </div>
    <h1>สร้าง Proposal IT ระดับมืออาชีพ ภายใน 20 นาที</h1>
    <p class="subtitle">AI วิเคราะห์ requirement → ออกแบบ solution → BOM + Proposal</p>
    <div id="error-msg" class="error-msg"></div>
    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">ชื่อผู้ใช้</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="your_username" />
      </div>
      <div class="field">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" id="login-btn">เข้าสู่ระบบ</button>
    </form>
  </div>
  <script src="/login/login.js"></script>
</body>
</html>
