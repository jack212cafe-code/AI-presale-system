<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Presale — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0e14;
      --surface: #13161f;
      --surface-2: #1a1e2a;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.14);
      --ink: #dce1ec;
      --ink-dim: #8691a8;
      --ink-faint: #4a5168;
      --accent: #22d3ee;
      --accent-dim: rgba(34,211,238,0.1);
      --accent-glow: rgba(34,211,238,0.25);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(34,211,238,0.08), transparent),
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Ccircle cx='20' cy='20' r='1' fill='rgba(255,255,255,0.025)'/%3E%3C/g%3E%3C/svg%3E");
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 40px 36px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), rgba(34,211,238,0.4));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 18px; height: 18px; fill: #0c0e14; }
    .logo-text {
      font-family: "Syne", sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .logo-text span { color: var(--accent); }
    h1 {
      font-family: "Syne", sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--ink-dim);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    label {
      display: block;
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      color: var(--ink-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      color: var(--ink);
      font-family: inherit;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    input::placeholder { color: var(--ink-faint); }
    .field { margin-bottom: 16px; }
    .error-msg {
      display: none;
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }
    button[type="submit"] {
      width: 100%;
      margin-top: 4px;
      background: var(--accent);
      color: #0c0e14;
      border: none;
      border-radius: var(--radius-sm);
      font-family: "Syne", sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    button[type="submit"]:hover { opacity: 0.88; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: wait; box-shadow: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20"><path d="M10 2L2 7v6l8 5 8-5V7L10 2zM10 4.18L16 8v4l-6 3.75L4 12V8l6-3.82z"/></svg>
      </div>
      <div class="logo-text">AI <span>Presale</span></div>
    </div>
    <h1>เข้าสู่ระบบ</h1>
    <p class="subtitle">ระบบช่วย presale สำหรับ IT infrastructure</p>
    <div id="error-msg" class="error-msg"></div>
    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="your_username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" id="login-btn">เข้าสู่ระบบ</button>
    </form>
  </div>
  <script src="/login/login.js"></script>
</body>
</html>
